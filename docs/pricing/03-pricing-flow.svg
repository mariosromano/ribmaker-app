<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="720" fill="#1a1a1f"/>

  <text x="600" y="44" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">Pricing Flow — Cost-Plus with $/sf Display</text>
  <text x="600" y="70" font-size="13" fill="#888" text-anchor="middle">Real costs drive the price. The $/sf number the customer sees is derived, not a formula multiplier.</text>

  <!-- ====== INPUTS ====== -->
  <text x="120" y="120" font-size="12" font-weight="700" fill="#888" letter-spacing="2">INPUTS</text>

  <!-- Sheets -->
  <g transform="translate(60, 140)">
    <rect width="220" height="80" fill="#2a2a2e" stroke="#7c9bff" stroke-width="2" rx="6"/>
    <text x="110" y="26" font-size="13" font-weight="700" fill="#7c9bff" text-anchor="middle">Sheets needed</text>
    <text x="110" y="46" font-size="11" fill="#aaa" text-anchor="middle">From rib count + height + depth</text>
    <text x="110" y="64" font-size="11" fill="#ccc" text-anchor="middle">(composing math kicks in)</text>
  </g>

  <!-- Ribs -->
  <g transform="translate(60, 240)">
    <rect width="220" height="80" fill="#2a2a2e" stroke="#7c9bff" stroke-width="2" rx="6"/>
    <text x="110" y="26" font-size="13" font-weight="700" fill="#7c9bff" text-anchor="middle">Rib count</text>
    <text x="110" y="46" font-size="11" fill="#aaa" text-anchor="middle">From "Number of Ribs"</text>
    <text x="110" y="64" font-size="11" fill="#ccc" text-anchor="middle">slider (e.g. 40)</text>
  </g>

  <!-- Surface area -->
  <g transform="translate(60, 340)">
    <rect width="220" height="80" fill="#2a2a2e" stroke="#7c9bff" stroke-width="2" rx="6"/>
    <text x="110" y="26" font-size="13" font-weight="700" fill="#7c9bff" text-anchor="middle">Surface area (sf)</text>
    <text x="110" y="46" font-size="11" fill="#aaa" text-anchor="middle">ribs × (height × maxDepth)</text>
    <text x="110" y="64" font-size="11" fill="#ccc" text-anchor="middle">÷ 144</text>
  </g>

  <!-- ====== COST CALCULATIONS ====== -->
  <text x="430" y="120" font-size="12" font-weight="700" fill="#888" letter-spacing="2">REAL COSTS</text>

  <!-- Material cost -->
  <g transform="translate(360, 140)">
    <rect width="240" height="50" fill="#3a2d4a" stroke="#c9a0ff" stroke-width="1.5" rx="4"/>
    <text x="120" y="20" font-size="12" font-weight="700" fill="#c9a0ff" text-anchor="middle">Material</text>
    <text x="120" y="38" font-size="11" fill="#fff" text-anchor="middle">sheets × $500</text>
  </g>

  <!-- CNC cost -->
  <g transform="translate(360, 200)">
    <rect width="240" height="50" fill="#3a2d4a" stroke="#c9a0ff" stroke-width="1.5" rx="4"/>
    <text x="120" y="20" font-size="12" font-weight="700" fill="#c9a0ff" text-anchor="middle">CNC milling</text>
    <text x="120" y="38" font-size="11" fill="#fff" text-anchor="middle">sheets × $300</text>
  </g>

  <!-- Hardware cost -->
  <g transform="translate(360, 260)">
    <rect width="240" height="50" fill="#3a2d4a" stroke="#c9a0ff" stroke-width="1.5" rx="4"/>
    <text x="120" y="20" font-size="12" font-weight="700" fill="#c9a0ff" text-anchor="middle">Hardware</text>
    <text x="120" y="38" font-size="11" fill="#fff" text-anchor="middle">ribs × $17 (U-channel + brackets)</text>
  </g>

  <!-- Arrows from inputs to costs -->
  <line x1="280" y1="180" x2="360" y2="165" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="180" x2="360" y2="225" stroke="#555" stroke-width="1.5"/>
  <line x1="280" y1="280" x2="360" y2="285" stroke="#555" stroke-width="1.5"/>

  <!-- Sum to total cost -->
  <g transform="translate(360, 340)">
    <rect width="240" height="80" fill="#3a2d4a" stroke="#c9a0ff" stroke-width="2.5" rx="6"/>
    <text x="120" y="26" font-size="13" font-weight="700" fill="#c9a0ff" text-anchor="middle">TOTAL COST</text>
    <text x="120" y="48" font-size="11" fill="#fff" text-anchor="middle">material + CNC + hardware</text>
    <text x="120" y="66" font-size="11" fill="#ffb38a" text-anchor="middle">e.g. $8,680 for default wall</text>
  </g>

  <!-- Brace from costs to total -->
  <line x1="600" y1="165" x2="640" y2="165" stroke="#888" stroke-width="1"/>
  <line x1="600" y1="225" x2="640" y2="225" stroke="#888" stroke-width="1"/>
  <line x1="600" y1="285" x2="640" y2="285" stroke="#888" stroke-width="1"/>
  <line x1="640" y1="165" x2="640" y2="285" stroke="#888" stroke-width="1"/>
  <line x1="640" y1="225" x2="660" y2="225" stroke="#888" stroke-width="1"/>
  <text x="650" y="218" font-size="14" fill="#888">Σ</text>

  <!-- ====== MARKUP ====== -->
  <text x="730" y="120" font-size="12" font-weight="700" fill="#888" letter-spacing="2">MARKUP</text>

  <g transform="translate(680, 350)">
    <circle cx="60" cy="35" r="42" fill="#2d4a2d" stroke="#8eff8e" stroke-width="2.5"/>
    <text x="60" y="32" font-size="22" font-weight="700" fill="#8eff8e" text-anchor="middle">× 2</text>
    <text x="60" y="52" font-size="10" fill="#bfeebf" text-anchor="middle">50% margin</text>
  </g>

  <!-- Arrow from total cost to markup -->
  <line x1="600" y1="380" x2="676" y2="385" stroke="#555" stroke-width="2"/>
  <polygon points="676,385 668,381 668,389" fill="#555"/>

  <!-- ====== RETAIL ====== -->
  <text x="900" y="120" font-size="12" font-weight="700" fill="#888" letter-spacing="2">CUSTOMER SEES</text>

  <g transform="translate(820, 340)">
    <rect width="320" height="80" fill="#2d4a2d" stroke="#8eff8e" stroke-width="2.5" rx="6"/>
    <text x="160" y="26" font-size="13" font-weight="700" fill="#8eff8e" text-anchor="middle">RETAIL PRICE</text>
    <text x="160" y="48" font-size="11" fill="#fff" text-anchor="middle">cost × 2</text>
    <text x="160" y="66" font-size="13" font-weight="700" fill="#8eff8e" text-anchor="middle">e.g. $17,360</text>
  </g>

  <!-- Arrow markup to retail -->
  <line x1="800" y1="385" x2="816" y2="385" stroke="#555" stroke-width="2"/>
  <polygon points="816,385 808,381 808,389" fill="#555"/>

  <!-- Divide for $/sf display -->
  <g transform="translate(820, 460)">
    <rect width="320" height="80" fill="#2a2a2e" stroke="#888" stroke-dasharray="4 3" stroke-width="1.5" rx="6"/>
    <text x="160" y="26" font-size="12" font-weight="700" fill="#aaa" text-anchor="middle">DISPLAYED $/SF</text>
    <text x="160" y="48" font-size="11" fill="#ccc" text-anchor="middle">retail ÷ surface area</text>
    <text x="160" y="66" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">e.g. $36/sf shown</text>
  </g>

  <!-- Arrow retail down to $/sf -->
  <line x1="980" y1="425" x2="980" y2="455" stroke="#555" stroke-width="1.5"/>
  <polygon points="980,455 976,448 984,448" fill="#555"/>

  <!-- Arrow surface area into $/sf -->
  <line x1="280" y1="380" x2="820" y2="500" stroke="#555" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="450" y="445" font-size="10" fill="#666" text-anchor="middle">(also feeds the $/sf display)</text>

  <!-- ====== FLOOR / GUARDRAIL ====== -->
  <text x="450" y="580" font-size="12" font-weight="700" fill="#888" letter-spacing="2">SAFETY FLOOR</text>

  <g transform="translate(360, 600)">
    <rect width="480" height="80" fill="#3a2d2d" stroke="#ffb38a" stroke-width="2" rx="6"/>
    <text x="240" y="26" font-size="13" font-weight="700" fill="#ffb38a" text-anchor="middle">MIN ORDER FLOOR: $3,500</text>
    <text x="240" y="48" font-size="11" fill="#fff" text-anchor="middle">Tiny projects (small wall, low rib count) jump up to $3,500</text>
    <text x="240" y="66" font-size="11" fill="#fff" text-anchor="middle">Covers shop time, truck, eng overhead — nothing under this is profitable</text>
  </g>

  <!-- Arrow from retail box to floor logic -->
  <line x1="980" y1="425" x2="840" y2="600" stroke="#ffb38a" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
</svg>
