<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="720" fill="#1a1a1f"/>

  <text x="600" y="44" font-size="24" font-weight="700" fill="#fff" text-anchor="middle">Margin Comparison — Current Model vs Proposed</text>
  <text x="600" y="70" font-size="13" fill="#888" text-anchor="middle">Current ($38/sf) swings wildly; Proposed (cost × 2) locks 50% margin every time.</text>

  <!-- Legend -->
  <g transform="translate(440, 96)">
    <rect width="14" height="14" fill="#ff6b6b" rx="2"/>
    <text x="22" y="11" font-size="11" fill="#ccc">CURRENT model: surfaceArea × $38/sf</text>
    <rect x="290" width="14" height="14" fill="#8eff8e" rx="2"/>
    <text x="312" y="11" font-size="11" fill="#ccc">PROPOSED: cost × 2 (50% margin lock)</text>
  </g>

  <!-- Chart axes -->
  <!-- Y axis: 0% to 60% margin. 1% = 7.5px (range 450px tall, starts at y=140) -->
  <!-- Plot area: y=140 (60%) to y=590 (0%). Gridlines at every 10%. -->
  <g>
    <line x1="100" y1="140" x2="100" y2="590" stroke="#555" stroke-width="1.5"/>
    <line x1="100" y1="590" x2="1140" y2="590" stroke="#555" stroke-width="1.5"/>

    <!-- Gridlines and Y labels -->
    <g font-size="11" fill="#888" text-anchor="end">
      <line x1="100" y1="140" x2="1140" y2="140" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="144">60%</text>
      <line x1="100" y1="215" x2="1140" y2="215" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="219">50%</text>
      <line x1="100" y1="290" x2="1140" y2="290" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="294">40%</text>
      <line x1="100" y1="365" x2="1140" y2="365" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="369">30%</text>
      <line x1="100" y1="440" x2="1140" y2="440" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="444">20%</text>
      <line x1="100" y1="515" x2="1140" y2="515" stroke="#2a2a2e" stroke-dasharray="2 4"/>
      <text x="92" y="519">10%</text>
      <text x="92" y="594">0%</text>
    </g>

    <!-- Y axis label -->
    <text x="40" y="365" font-size="12" fill="#aaa" transform="rotate(-90 40 365)" text-anchor="middle">GROSS MARGIN</text>

    <!-- 50% target line -->
    <line x1="100" y1="215" x2="1140" y2="215" stroke="#8eff8e" stroke-width="1" stroke-dasharray="6 4"/>
    <text x="1148" y="219" font-size="11" fill="#8eff8e">target 50%</text>
  </g>

  <!-- Bars -->
  <!-- 6 wall configs, each gets 2 bars side by side. Width per pair: 160px. Gap 40px. -->
  <!-- Start x=130. 6 groups span 1000px. -->
  <g>
    <!-- Helper data:
         For each config: name, current_margin, proposed_margin
         Bar height: margin_pct * 7.5px -->

    <!-- Config 1: 6'×6" small (20 ribs) -->
    <g transform="translate(130, 0)">
      <!-- Current 16% -->
      <rect x="20" y="470" width="55" height="120" fill="#ff6b6b"/>
      <text x="47" y="464" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">16%</text>
      <!-- Proposed 50% -->
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <!-- Label -->
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">6' × 6" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">20 ribs (small)</text>
    </g>

    <!-- Config 2: 6'×12" (40 ribs) -->
    <g transform="translate(290, 0)">
      <rect x="20" y="328" width="55" height="262" fill="#ff6b6b"/>
      <text x="47" y="322" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">35%</text>
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">6' × 12" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">40 ribs</text>
    </g>

    <!-- Config 3: 8'×8" (40 ribs) -->
    <g transform="translate(450, 0)">
      <rect x="20" y="320" width="55" height="270" fill="#ff6b6b"/>
      <text x="47" y="314" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">36%</text>
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">8' × 8" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">40 ribs (composed)</text>
    </g>

    <!-- Config 4: 9'×8" (40 ribs) -->
    <g transform="translate(610, 0)">
      <rect x="20" y="328" width="55" height="262" fill="#ff6b6b"/>
      <text x="47" y="322" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">35%</text>
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">9' × 8" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">40 ribs (composed)</text>
    </g>

    <!-- Config 5: 12'×12" default (40 ribs) -->
    <g transform="translate(770, 0)">
      <rect x="20" y="200" width="55" height="390" fill="#ff6b6b"/>
      <text x="47" y="194" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">52%</text>
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">12' × 12" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">40 ribs (default)</text>
    </g>

    <!-- Config 6: 12'×4" shallow (40 ribs) -->
    <g transform="translate(930, 0)">
      <rect x="20" y="455" width="55" height="135" fill="#ff6b6b"/>
      <text x="47" y="449" font-size="11" font-weight="700" fill="#ff6b6b" text-anchor="middle">18%</text>
      <rect x="80" y="215" width="55" height="375" fill="#8eff8e"/>
      <text x="107" y="209" font-size="11" font-weight="700" fill="#8eff8e" text-anchor="middle">50%</text>
      <text x="78" y="612" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">12' × 4" depth</text>
      <text x="78" y="628" font-size="10" fill="#888" text-anchor="middle">40 ribs (shallow)</text>
    </g>
  </g>

  <!-- Bottom annotations -->
  <g transform="translate(100, 660)">
    <rect width="1040" height="48" fill="#2a2a2e" rx="4"/>
    <text x="20" y="20" font-size="12" font-weight="700" fill="#ff6b6b">CURRENT MODEL: margin swings 16%–52%</text>
    <text x="20" y="38" font-size="11" fill="#ccc">Small or shallow walls bleed cash. Big standard walls are over-marginned. Customer sees flat $/sf, doesn't know.</text>

    <text x="540" y="20" font-size="12" font-weight="700" fill="#8eff8e">PROPOSED MODEL: locked 50% every time</text>
    <text x="540" y="38" font-size="11" fill="#ccc">Cost × 2. Customer sees variable $/sf (volume discount). You always make money.</text>
  </g>
</svg>
